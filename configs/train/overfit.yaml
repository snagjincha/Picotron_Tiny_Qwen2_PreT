# Deliberately aggressive recipe for the fixed-batch correctness check only.
# Do not use these learning rates for the C4 smoke run or full pretraining.
precision: fp32
seed: 42
max_steps: 80
gradient_clip_norm: 1.0

optimizer:
  name: adamw
  adamw:
    learning_rate: 3.0e-3
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.0
  muon_hybrid:
    muon_learning_rate: 0.02
    momentum: 0.95
    nesterov: true
    ns_steps: 5
    weight_decay: 0.0
    auxiliary_adamw_learning_rate: 3.0e-3
    auxiliary_adamw_betas: [0.9, 0.95]
    auxiliary_adamw_eps: 1.0e-8
    auxiliary_adamw_weight_decay: 0.0

scheduler:
  name: cosine
  warmup_ratio: 0.0
  min_lr_ratio: 1.0
