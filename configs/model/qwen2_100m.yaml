# Qwen2-style dense causal LM using the original Qwen2 tokenizer vocabulary.
# The output head is tied to the token embedding matrix.
name: qwen2_style_100m
architecture: qwen2_dense
vocab_size: 151936
max_position_embeddings: 512
hidden_size: 512
num_hidden_layers: 8
num_attention_heads: 8
num_key_value_heads: 4
intermediate_size: 1360
rms_norm_eps: 1.0e-6
rope_theta: 1000000.0
hidden_act: silu
attention_bias: false
mlp_bias: false
tie_word_embeddings: true
attention_dropout: 0.0
residual_dropout: 0.0
initializer_range: 0.02

# Calculated by scripts/verify_model_config.py before model implementation.
expected_parameter_count: 100803072
